server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter web usa rutas client-side
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Cache estatico con hash en nombre
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
